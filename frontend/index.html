<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI-powered smart todo app with Eisenhower Matrix prioritization" />
    <meta name="theme-color" content="#7c3aed" />
    <title>AI Smart Todo – Your AI Productivity Companion</title>
    <script>
      // Prevent flash of wrong theme
      (function() {
        var theme = localStorage.getItem('ai-todo-theme') || 'system';
        var resolved = theme === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : theme;
        document.documentElement.setAttribute('data-theme', resolved);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
